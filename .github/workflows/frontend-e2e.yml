name: Frontend E2E
on:
  workflow_dispatch:

jobs:
  core-flows:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: {version: "11.9.0"}
      - uses: actions/setup-node@v4
        with: {node-version: "22", cache: pnpm, cache-dependency-path: frontend/pnpm-lock.yaml}
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pnpm exec playwright install --with-deps chromium
        working-directory: frontend
      - run: docker compose --profile phase7 up -d --wait
      - run: docker compose exec -T backend alembic -c migrations/control/alembic.ini upgrade head
      - run: docker compose exec -T backend python -m energy_agent.evaluation.reload_dataset --replace-all
      - run: pnpm e2e
        working-directory: frontend
        env:
          PHASE7_REAL_E2E: "1"
      - if: always()
        run: docker compose --profile phase7 logs --no-color > phase7-compose.log
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-e2e-artifacts
          path: |
            frontend/playwright-report
            frontend/test-results
            phase7-compose.log
      - if: always()
        run: docker compose --profile phase7 down -v
