name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --locked --dev
      - run: make verify-design
      - run: make lint
      - run: make typecheck
      - run: make test-unit
      - run: make test-contract

  m0-full:
    needs: quality
    runs-on: [self-hosted, linux, x64, m0-full]
    environment: m0-full
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --locked --dev
      - run: make gate-m0
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m0-gate
          path: artifacts/gates/M0/
          if-no-files-found: error
