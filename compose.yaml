services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: energy_agent
      MYSQL_USER: energy
      MYSQL_PASSWORD: energy_dev
      MYSQL_ROOT_PASSWORD: root_dev
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot_dev"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - energy_mysql_data:/var/lib/mysql

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30

  influxdb:
    image: influxdb:2.7-alpine
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: energy
      DOCKER_INFLUXDB_INIT_PASSWORD: energy_dev_password
      DOCKER_INFLUXDB_INIT_ORG: energy
      DOCKER_INFLUXDB_INIT_BUCKET: energy_metrics
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: energy-token
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - energy_influx_data:/var/lib/influxdb2

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: energy
      MINIO_ROOT_PASSWORD: energy_minio_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - energy_minio_data:/data

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls=http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - energy_etcd_data:/etcd

  milvus:
    image: milvusdb/milvus:v2.5.10
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: energy
      MINIO_SECRET_ACCESS_KEY: energy_minio_dev
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 3s
      timeout: 3s
      retries: 40
    volumes:
      - energy_milvus_data:/var/lib/milvus

  backend:
    profiles: ["phase2", "phase3"]
    build: .
    environment:
      MYSQL_DSN: mysql+asyncmy://energy:energy_dev@mysql:3306/energy_agent
      REDIS_URL: redis://redis:6379/0
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: energy-token
      INFLUXDB_ORG: energy
      INFLUXDB_BUCKET: energy_metrics
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      influxdb:
        condition: service_healthy

volumes:
  energy_mysql_data:
  energy_influx_data:
  energy_minio_data:
  energy_etcd_data:
  energy_milvus_data:
