services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: energy_agent
      MYSQL_USER: energy
      MYSQL_PASSWORD: energy_dev
      MYSQL_ROOT_PASSWORD: root_dev
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot_dev"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - energy_mysql_data:/var/lib/mysql

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30

  influxdb:
    image: influxdb:2.7-alpine
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: energy
      DOCKER_INFLUXDB_INIT_PASSWORD: energy_dev_password
      DOCKER_INFLUXDB_INIT_ORG: energy
      DOCKER_INFLUXDB_INIT_BUCKET: energy_metrics
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: energy-token
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - energy_influx_data:/var/lib/influxdb2

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: energy
      MINIO_ROOT_PASSWORD: energy_minio_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - energy_minio_data:/data

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls=http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - energy_etcd_data:/etcd

  milvus:
    image: milvusdb/milvus:v2.5.10
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: energy
      MINIO_SECRET_ACCESS_KEY: energy_minio_dev
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 3s
      timeout: 3s
      retries: 40
    volumes:
      - energy_milvus_data:/var/lib/milvus

  rabbitmq:
    image: rabbitmq:4.1-management-alpine
    user: "0:0"
    environment:
      RABBITMQ_DEFAULT_USER: energy
      RABBITMQ_DEFAULT_PASS: energy_dev
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 3s
      timeout: 5s
      retries: 40
    volumes:
      - energy_rabbitmq_data:/var/lib/rabbitmq

  neo4j:
    image: neo4j:5.26.8-community
    environment:
      NEO4J_AUTH: neo4j/energy_neo4j_dev
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 40
    volumes:
      - energy_neo4j_data:/data

  index-worker:
    profiles: ["phase5", "phase6", "phase7", "pilot"]
    build: .
    restart: unless-stopped
    command: ["python", "-m", "energy_agent.indexing.worker"]
    environment:
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      OBSERVABILITY_MODE: ${OBSERVABILITY_MODE:-local}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
      TRACE_CONTENT_MODE: ${TRACE_CONTENT_MODE:-metadata_only}
      INDEX_EXECUTION_MODE: rabbitmq
      MYSQL_DSN: mysql+aiomysql://energy:energy_dev@mysql:3306/energy_agent
      RABBITMQ_URL: amqp://energy:energy_dev@rabbitmq:5672/
      MILVUS_URI: http://milvus:19530
      MILVUS_TOKEN: ${MILVUS_TOKEN:-}
      EMBEDDING_MODE: ${EMBEDDING_MODE:-disabled}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-m3}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1024}
      EMBEDDING_TIMEOUT_SECONDS: ${EMBEDDING_TIMEOUT_SECONDS:-15}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-16}
      GRAPH_MODE: neo4j
      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: energy_neo4j_dev
      WORKER_METRICS_PORT: "9101"
    ports:
      - "9101:9101"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      milvus:
        condition: service_healthy

  backend:
    profiles: ["phase2", "phase3", "phase5", "phase6", "phase7", "pilot"]
    build: .
    environment:
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      MYSQL_DSN: mysql+aiomysql://energy:energy_dev@mysql:3306/energy_agent
      REDIS_URL: redis://redis:6379/0
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: energy-token
      INFLUXDB_ORG: energy
      INFLUXDB_BUCKET: energy_metrics
      MODEL_MODE: ${MODEL_MODE:-disabled}
      MODEL_GATEWAY_BASE_URL: ${MODEL_GATEWAY_BASE_URL:-}
      MODEL_GATEWAY_API_KEY: ${MODEL_GATEWAY_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MODEL_NAME: ${MODEL_NAME:-gpt-5.6-terra}
      OBSERVABILITY_MODE: ${OBSERVABILITY_MODE:-local}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
      TRACE_CONTENT_MODE: ${TRACE_CONTENT_MODE:-metadata_only}
      RETRIEVAL_MODE: ${RETRIEVAL_MODE:-keyword_only}
      QUERY_REWRITE_MODE: ${QUERY_REWRITE_MODE:-rules}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: energy
      MINIO_SECRET_KEY: energy_minio_dev
      MILVUS_URI: http://milvus:19530
      MILVUS_TOKEN: ${MILVUS_TOKEN:-}
      EMBEDDING_MODE: ${EMBEDDING_MODE:-disabled}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-m3}
      RERANK_MODE: ${RERANK_MODE:-disabled}
      RERANK_BASE_URL: ${RERANK_BASE_URL:-}
      RERANK_API_KEY: ${RERANK_API_KEY:-}
      RERANK_MODEL: ${RERANK_MODEL:-BAAI/bge-reranker-v2-m3}
      INDEX_EXECUTION_MODE: ${INDEX_EXECUTION_MODE:-rabbitmq}
      RABBITMQ_URL: amqp://energy:energy_dev@rabbitmq:5672/
      GRAPH_MODE: ${GRAPH_MODE:-neo4j}
      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: energy_neo4j_dev
      AUTH_MODE: ${AUTH_MODE:-development_headers}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-}
      JWT_ISSUER: ${JWT_ISSUER:-energy-agent}
      JWT_ACCESS_AUDIENCE: ${JWT_ACCESS_AUDIENCE:-energy-agent-api}
      JWT_REFRESH_AUDIENCE: ${JWT_REFRESH_AUDIENCE:-energy-agent-refresh}
      JWT_ACCESS_TTL_MINUTES: ${JWT_ACCESS_TTL_MINUTES:-15}
      JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS:-7}
      PILOT_MODE: ${PILOT_MODE:-false}
      PILOT_ALLOWED_ACTORS: ${PILOT_ALLOWED_ACTORS:-}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-false}
      RATE_LIMIT_DIAGNOSIS_PER_MINUTE: ${RATE_LIMIT_DIAGNOSIS_PER_MINUTE:-30}
      RATE_LIMIT_REVIEW_PER_MINUTE: ${RATE_LIMIT_REVIEW_PER_MINUTE:-10}
      RATE_LIMIT_CASE_WRITE_PER_MINUTE: ${RATE_LIMIT_CASE_WRITE_PER_MINUTE:-10}
      RATE_LIMIT_STREAM_CONCURRENT: ${RATE_LIMIT_STREAM_CONCURRENT:-2}
      RATE_LIMIT_AUTH_LOGIN_USERNAME: ${RATE_LIMIT_AUTH_LOGIN_USERNAME:-5}
      RATE_LIMIT_AUTH_LOGIN_SOURCE: ${RATE_LIMIT_AUTH_LOGIN_SOURCE:-20}
      RATE_LIMIT_AUTH_REFRESH_PER_MINUTE: ${RATE_LIMIT_AUTH_REFRESH_PER_MINUTE:-30}
      REQUEST_BODY_MAX_BYTES: ${REQUEST_BODY_MAX_BYTES:-1048576}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=2)
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 15s
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      minio:
        condition: service_healthy
      milvus:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    profiles: ["phase7", "pilot"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_BASE_URL: http://backend:8000
      BACKEND_INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      FRONTEND_AUTH_MODE: ${FRONTEND_AUTH_MODE:-development_headers}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      FRONTEND_DEFAULT_ACTOR_ID: ${FRONTEND_DEFAULT_ACTOR_ID:-local-operator}
      FRONTEND_DEFAULT_ACTOR_ROLE: ${FRONTEND_DEFAULT_ACTOR_ROLE:-operator}
      FRONTEND_LOCAL_VIEWER_ACTOR_ID: ${FRONTEND_LOCAL_VIEWER_ACTOR_ID:-local-viewer}
      FRONTEND_LOCAL_OPERATOR_ACTOR_ID: ${FRONTEND_LOCAL_OPERATOR_ACTOR_ID:-pilot-operator}
      FRONTEND_LOCAL_REVIEWER_ACTOR_ID: ${FRONTEND_LOCAL_REVIEWER_ACTOR_ID:-pilot-reviewer}
      FRONTEND_LOCAL_ADMIN_ACTOR_ID: ${FRONTEND_LOCAL_ADMIN_ACTOR_ID:-phase6-evaluator}
      FRONTEND_APP_ENV: ${FRONTEND_APP_ENV:-local}
      GRAFANA_URL: ${GRAFANA_URL:-http://localhost:3001}
      LANGFUSE_URL: ${LANGFUSE_URL:-}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  prometheus:
    profiles: ["pilot-observability"]
    image: prom/prometheus:v3.5.0
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/pilot/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/pilot/observability/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro

  grafana:
    profiles: ["pilot-observability"]
    image: grafana/grafana:12.1.0
    ports:
      - "3000:3000"
    volumes:
      - ./deploy/pilot/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/pilot/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  energy_mysql_data:
  energy_influx_data:
  energy_minio_data:
  energy_etcd_data:
  energy_milvus_data:
  energy_rabbitmq_data:
  energy_neo4j_data:
